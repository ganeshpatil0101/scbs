<!DOCTYPE html>
<html lang="mr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>नवीन जी.एल ग्रुप — CBS Mockup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <link rel="stylesheet" href="../../../_shared/mockup-base.css">
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen pb-24">

  <div class="bg-amber-50 border-b border-amber-200 text-amber-800 text-sm text-center py-2 px-4">
    हा केवळ लेआउट पूर्वावलोकन आहे — बँक वापरकर्त्यांच्या मंजुरीसाठी
  </div>

  <div class="max-w-9xl mx-auto px-4 sm:px-6 lg:px-8 py-6">

    <header class="mb-6 pb-4 border-b border-gray-200">
      <h1 class="text-2xl font-bold text-gray-900">नवीन जी.एल ग्रुप</h1>
      <p class="text-sm text-gray-500 mt-1">डॅशबोर्ड &gt; सेटिंग्ज &gt; लेखा &gt; नवीन जी.एल ग्रुप</p>
    </header>

    <section class="mockup-section max-w-3xl" aria-labelledby="section-primary-group">
      <h2 class="mockup-section-title" id="section-primary-group">प्राथमिक गट</h2>

      <fieldset class="border-0 p-0 m-0 mb-4" aria-label="नफा तोटा किंवा ताळेबंद">
        <div class="flex flex-wrap gap-6">
          <label class="inline-flex items-center gap-2 cursor-pointer" data-spec-field="1">
            <input type="radio" name="statementType" value="pnl" checked>
            <span>नफा तोटा</span>
          </label>
          <label class="inline-flex items-center gap-2 cursor-pointer" data-spec-field="2">
            <input type="radio" name="statementType" value="balance-sheet">
            <span>ताळेबंद</span>
          </label>
        </div>
      </fieldset>

      <fieldset class="border-0 p-0 m-0 mb-6" aria-label="उत्पन्न किंवा खर्च">
        <div class="flex flex-wrap gap-6">
          <label class="inline-flex items-center gap-2 cursor-pointer" data-spec-field="3">
            <input type="radio" name="incomeExpense" value="income" checked>
            <span>उत्पन्न</span>
          </label>
          <label class="inline-flex items-center gap-2 cursor-pointer" data-spec-field="4">
            <input type="radio" name="incomeExpense" value="expense">
            <span>खर्च</span>
          </label>
        </div>
      </fieldset>

      <div class="mockup-field-grid">
        <div data-spec-field="5">
          <label class="mockup-label" for="field-group-type">
            गट प्रकार निवडा <span class="mockup-required">*</span>
            <span class="mockup-badge-todo">TODO</span>
          </label>
          <select id="field-group-type">
            <option value="other" selected>इतर</option>
            <option disabled>[TODO — master data pending]</option>
          </select>
        </div>
        <div data-spec-field="6">
          <label class="mockup-label" for="field-group-name">
            गटाचे नाव <span class="mockup-required">*</span>
          </label>
          <input type="text" id="field-group-name">
        </div>
        <div data-spec-field="7">
          <label class="mockup-label" for="field-group-name-unicode">गटाचे नाव (युनिकोड)</label>
          <input type="text" id="field-group-name-unicode">
        </div>
      </div>
    </section>
  </div>

  <footer class="fixed bottom-0 inset-x-0 bg-white border-t border-gray-200 shadow-[0_-2px_8px_rgba(0,0,0,0.06)] z-50" aria-label="स्क्रीन कृती">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-3 flex flex-wrap justify-end gap-2">
      <button type="button" class="mockup-btn mockup-btn-secondary" id="btn-reset">पूर्ववत</button>
      <button type="button" class="mockup-btn mockup-btn-primary" id="btn-save">पूर्ण</button>
    </div>
  </footer>

</body>
</html>
